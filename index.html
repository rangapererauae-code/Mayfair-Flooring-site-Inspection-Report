<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Inspection Report</title>

<style>
:root{
--blue:#0a84ff;
--bg:#f2f2f7;
--card:#ffffff;
--text:#111;
--line:#dcdcdc;
--radius:18px;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Arial,sans-serif;
background:var(--bg);
color:var(--text);
padding:14px;
}

.wrap{
max-width:900px;
margin:auto;
}

h1{
font-size:28px;
text-align:center;
margin:10px 0 18px;
font-weight:700;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:16px;
margin-bottom:14px;
box-shadow:0 4px 14px rgba(0,0,0,.06);
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

@media(min-width:700px){
.grid{
grid-template-columns:1fr 1fr;
}
}

label{
font-size:14px;
font-weight:600;
display:block;
margin-bottom:6px;
}

input, textarea{
width:100%;
border:1px solid var(--line);
border-radius:14px;
padding:12px;
font-size:16px;
background:#fff;
outline:none;
}

textarea{
min-height:110px;
resize:vertical;
}

button{
touch-action: manipulation;
-webkit-appearance: none;
appearance: none;
width:100%;
border:none;
border-radius:16px;
padding:15px;
font-size:17px;
font-weight:700;
margin-top:10px;
cursor:pointer;
touch-action:manipulation;
}

.primary{background:var(--blue);color:#fff;}
.green{background:#34c759;color:#fff;}
.red{background:#ff3b30;color:#fff;}
.gray{background:#8e8e93;color:#fff;}

.section-title{
font-size:18px;
font-weight:700;
margin-bottom:10px;
}


.small{
font-size:12px;
opacity:.7;
margin-top:6px;
}

.footerBtns{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

@media(min-width:700px){
.footerBtns{
grid-template-columns:1fr 1fr 1fr;
}
}

@media print{
body{
background:#fff;
padding:0;
}
button,.no-print{
display:none!important;
}
.card{
box-shadow:none;
border-radius:0;
page-break-inside:avoid;
margin:0 0 12px;
}
input,textarea{
border:none;
padding:0;
}
.photoRow{
page-break-inside:avoid;
}
.preview{
display:block !important;
max-height:none;
}
}
</style>
</head>
<body>

<div class="wrap" id="reportArea">

<h1>Inspection Report</h1>

<div class="card">
<div class="grid">
<div>
<label>Project Name</label>
<input id="project" placeholder="Enter project name">
</div>

<div>
<label>Location</label>
<input id="location" placeholder="Enter location">
</div>

<div>
<label>Client Name</label>
<input id="client" placeholder="Enter client name">
</div>

<div>
<label>Material Name</label>
<input id="material" placeholder="Enter material">
</div>

<div>
<label>Pattern</label>
<input id="pattern" placeholder="Enter pattern">
</div>
</div>
</div>

<div class="card">
<div class="section-title">General Notes</div>
<textarea id="notes" placeholder="Write notes..."></textarea>
</div>

<div class="card">
<div class="section-title">Variation Details</div>
<textarea id="variation" placeholder="Write variations..."></textarea>
</div>

<div class="card no-print">
<div class="footerBtns">
<button class="green" onclick="downloadPDF()">Download PDF</button>
<button class="gray" onclick="window.print()">Print Preview</button>
<button class="red" onclick="clearForm()">Clear Form</button>
</div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
(function(){
  if("ontouchstart" in window){
    document.addEventListener("touchstart", function(){}, {passive:true});
  }
})();

function downloadPDF(){
const element=document.getElementById("reportArea");
const opt={
margin:0.2,
filename:'Inspection_Report.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{scale:2,useCORS:true,scrollY:0},
jsPDF:{unit:'in',format:'a4',orientation:'portrait'},
pagebreak:{mode:['avoid-all','css','legacy']}
};
html2pdf().set(opt).from(element).save();
}

function clearForm(){
if(confirm("Clear all report data?")){
document.querySelectorAll("input, textarea").forEach(el=>el.value='');
}
}
</script>

</body>
</html>
